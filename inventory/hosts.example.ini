[control_plane]
kub62-control-plane ansible_host=192.168.1.2 clone_destination=nvme

[worker]
kub62-worker-1 ansible_host=192.168.1.3 clone_destination=usb

[kiosk]
kub62-kiosk-1 ansible_host=192.168.1.4 clone_destination=usb bodgestr_device_usb_id=xxxx:xxxx

[kiosk:vars]
kiosk_urls=https://foo.bar/baz1?kiosk https://foo.bar/baz2?kiosk https://foo.bar/baz3?kiosk

[all:vars]
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_uid=1000
ansible_user=pi
clone_label_prefix=kub62
k3s_exec_flags=--disable traefik --disable servicelb --disable local-storage
locale=de_AT.UTF-8
timezone=Europe/Vienna
