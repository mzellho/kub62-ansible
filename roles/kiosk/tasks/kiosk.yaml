---
- name: Disable getty on tty1
  ansible.builtin.systemd:
    name: getty@tty1
    enabled: false
    state: stopped

- name: Install X11, Openbox, Chromium and kiosk dependencies
  ansible.builtin.apt:
    name:
      - xserver-xorg
      - x11-xserver-utils
      - xinit
      - openbox
      - chromium
      - dbus-x11
      - xauth
      - fonts-dejavu-core
      - unclutter
      - fonts-noto-color-emoji
      - xdotool
    state: present
    install_recommends: false
    update_cache: true

- name: Create .xsession to start Openbox
  ansible.builtin.copy:
    dest: "/home/{{ ansible_user }}/.xsession"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
    content: |
      exec openbox-session

- name: Ensure Openbox config directory exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.config/openbox"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Add kiosk user to input group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: input
    append: true

- name: Get dpkg architecture
  ansible.builtin.command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false

- name: Get latest bodgestr release info from GitHub
  ansible.builtin.uri:
    url: https://api.github.com/repos/mzellho/bodgestr/releases/latest
    return_content: true
  register: bodgestr_release

- name: Gather installed package facts
  ansible.builtin.package_facts:
    manager: apt

- name: Install latest bodgestr .deb from GitHub
  ansible.builtin.apt:
    deb: >-
      {{
        bodgestr_release.json.assets
        | map(attribute='browser_download_url')
        | select('search',
            'arm64' ~ '_' ~
            ansible_distribution_release ~
            '\.deb$'
          )
        | list
        | first
      }}
    state: present

- name: Deploy bodgestr gestures config
  ansible.builtin.copy:
    dest: /etc/bodgestr/gestures.toml
    owner: root
    group: root
    mode: "0644"
    content: |
      [global]
      log_level = "info"
      log_file = "/var/log/bodgestr/bodgestr.log"

      [global.thresholds]
      swipe_time_max = 0.9
      swipe_distance_min_pct = 0.15
      angle_tolerance_deg = 30.0
      tap_time_max = 0.2
      tap_distance_max = 50.0
      long_press_time_min = 0.8
      double_tap_interval = 0.3
      double_tap_distance_max = 50.0
      pinch_threshold_pct = 0.1

      [global.gestures.tap]
      action = "xdotool click 1"
      enabled = true

      [global.gestures.swipe_left]
      action = "xdotool key ctrl+Tab"
      enabled = true

      [global.gestures.swipe_right]
      action = "xdotool key ctrl+shift+Tab"
      enabled = true

      [global.gestures.swipe_down]
      action = "xdotool key F5"
      enabled = true

      [global.gestures.pinch_in]
      action = "xdotool key ctrl+minus"
      enabled = true

      [global.gestures.pinch_out]
      action = "xdotool key ctrl+plus"
      enabled = true

      [device.kiosk]
      device_usb_id = "{{ bodgestr_device_usb_id }}"
      enabled = true

- name: Create bodgestr systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/bodgestr.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Override bodgestr service for kiosk setup
  ansible.builtin.copy:
    dest: /etc/systemd/system/bodgestr.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      After=
      After=multi-user.target
      Wants=
      Wants=multi-user.target

      [Service]
      User={{ ansible_user }}
      Group={{ ansible_user }}
      SupplementaryGroups=input
      Environment=DISPLAY=:0
      Environment=XAUTHORITY=/home/{{ ansible_user }}/.Xauthority
      WorkingDirectory=/home/{{ ansible_user }}
      ProtectSystem=no
      ReadWritePaths=

      [Install]
      WantedBy=
      WantedBy=multi-user.target
  become: true

- name: Enable and start bodgestr service
  ansible.builtin.systemd:
    name: bodgestr.service
    daemon_reload: true
    enabled: true
    state: started

- name: Configure Openbox autostart for Chromium kiosk
  ansible.builtin.copy:
    dest: "/home/{{ ansible_user }}/.config/openbox/autostart"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
    content: |
      # Disable screen blanking
      xset s off
      xset -dpms
      xset s noblank

      # Hide mouse cursor
      unclutter -idle 0.1 &

      # Start Chromium in kiosk mode
      chromium \
        --kiosk {{ kiosk_urls }} \
        --noerrdialogs \
        --disable-infobars \
        --disable-session-crashed-bubble \
        --disable-features=TranslateUI,TouchpadOverscrollHistoryNavigation \
        --overscroll-history-navigation=0 \
        --touch-events=enabled \
        --hide-scrollbars
  notify: Restart kiosk

- name: Ensure .Xauthority exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.Xauthority"
    state: touch
    access_time: preserve
    modification_time: preserve
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"

- name: Install kiosk systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/kiosk.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Kiosk Browser
      After=systemd-user-sessions.service network-online.target bodgestr.service
      Wants=network-online.target bodgestr.service

      [Service]
      User={{ ansible_user }}

      PAMName=login
      StandardInput=tty
      StandardOutput=tty
      StandardError=tty
      TTYPath=/dev/tty1
      TTYReset=yes
      TTYVHangup=yes
      TTYVTDisallocate=yes

      Environment=DISPLAY=:0
      Environment=XDG_RUNTIME_DIR=/run/user/{{ ansible_uid }}
      WorkingDirectory=/home/{{ ansible_user }}

      ExecStart=/usr/bin/startx /home/{{ ansible_user }}/.xsession -- :0 vt1

      Restart=always
      RestartSec=5

      [Install]
      WantedBy=multi-user.target
  notify: Restart kiosk

- name: Enable and start kiosk service
  ansible.builtin.systemd:
    name: kiosk.service
    daemon_reload: true
    enabled: true
    state: started
