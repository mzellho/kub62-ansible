---
- name: Wait until k3s API is reachable
  ansible.builtin.uri:
    url: "{{ k3s_url }}"
    method: GET
    validate_certs: false
    status_code:
      - 401
    timeout: 5
  register: k3s_api_probe
  changed_when: false
  until: k3s_api_probe.status == 401
  retries: 60
  delay: 5

- name: Join k3s cluster # noqa: command-instead-of-module
  ansible.builtin.shell: |
    set -o pipefail
    curl -sfL https://get.k3s.io | K3S_TOKEN="{{ k3s_token }}" K3S_URL="{{ k3s_url }}" INSTALL_K3S_EXEC="{{ k3s_exec_flags | default('agent') }}" sh -
  args:
    executable: /bin/bash
    creates: /usr/local/bin/k3s
  no_log: true
