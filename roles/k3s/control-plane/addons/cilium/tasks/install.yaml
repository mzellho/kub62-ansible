---
- name: Check if cilium CLI is already installed
  ansible.builtin.command: which cilium
  register: cilium_check
  changed_when: false
  failed_when: false

- name: Install cilium CLI
  ansible.builtin.shell: |
    CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
    CLI_ARCH=amd64
    if [ "$(uname -m)" = "aarch64" ]; then CLI_ARCH=arm64; fi
    curl -L --fail --remote-name-all \
      https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-${CLI_ARCH}.tar.gz{,.sha256sum}
    sha256sum --check cilium-linux-${CLI_ARCH}.tar.gz.sha256sum
    tar xzvfC cilium-linux-${CLI_ARCH}.tar.gz /usr/local/bin
    rm cilium-linux-${CLI_ARCH}.tar.gz{,.sha256sum}
  args:
    executable: /bin/bash
  changed_when: true
  when: cilium_check.rc != 0
  become: true

- name: Add cilium bash completion
  ansible.builtin.shell: cilium completion bash > /etc/bash_completion.d/cilium
  args:
    executable: /bin/bash
    creates: /etc/bash_completion.d/cilium
  become: true
